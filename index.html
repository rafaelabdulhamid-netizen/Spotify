<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify iOS App Store</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7; margin: 0; padding: 20px;
            display: block; text-align: center; color: #1d1d1f;
        }
        .container {
            max-width: 400px; margin: 40px auto;
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .app-icon {
            width: 80px; height: 80px; background: #1DB954;
            border-radius: 18px; margin: 0 auto 15px auto;
            color: white; font-size: 36px; line-height: 80px; font-weight: bold;
        }
        h1 { font-size: 22px; margin-bottom: 5px; }
        p { color: #86868b; font-size: 14px; margin-bottom: 25px; }
        .btn-install {
            display: inline-block; background: #0071e3; color: white;
            text-decoration: none; padding: 12px 40px; font-weight: 600;
            border-radius: 25px; font-size: 15px; transition: 0.2s;
            cursor: pointer; border: none;
        }
        .btn-install:hover { background: #0077ed; }
        .warning {
            margin-top: 30px; background: #fff3cd; color: #856404;
            padding: 15px; border-radius: 10px; font-size: 12px; text-align: left;
        }
        .debug {
            margin-top: 20px; background: #f0f0f0; padding: 10px; border-radius: 8px;
            font-size: 11px; color: #666; word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="app-icon">🎵</div>
        <h1>Spotify</h1>
        <p>Bersyon 1.0.0 • iOS 15 at Pataas</p>
        
        <!-- Button with JavaScript to trigger itms-services -->
        <button class="btn-install" onclick="installApp(); return false;">INSTALL APP</button>

        <div class="warning">
            <strong>Paalala para sa mga Gumagamit:</strong><br>
            1. I-tap ang INSTALL APP.<br>
            2. I-confirm ang installation prompt.<br>
            3. Pumunta sa <strong>Settings > General > VPN & Device Management</strong> at i-trust ang developer certificate.<br>
            4. Bukas ang app mula sa home screen.
        </div>

        <div class="debug" id="debug"></div>
    </div>

    <script>
        function installApp() {
            const manifestUrl = 'https://rafaelabdulhamid-netizen.github.io/Spotify/manifest.plist';
            const itunesUrl = 'itms-services://?action=download-manifest&url=' + encodeURIComponent(manifestUrl);
            
            // Log for debugging
            console.log('Opening: ' + itunesUrl);
            document.getElementById('debug').innerHTML = 'Manifest: ' + manifestUrl;
            
            // Try multiple methods to ensure it works
            try {
                // Method 1: Direct location change
                window.location = itunesUrl;
            } catch(e) {
                console.error('Error:', e);
            }
            
            return false;
        }
    </script>

</body>
</html>
