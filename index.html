<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify iOS App Store</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7; margin: 0; padding: 20px;
            display: block; text-align: center; color: #1d1d1f;
        }
        .container {
            max-width: 400px; margin: 40px auto;
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .app-icon {
            width: 80px; height: 80px; background: #1DB954;
            border-radius: 18px; margin: 0 auto 15px auto;
            color: white; font-size: 36px; line-height: 80px; font-weight: bold;
        }
        h1 { font-size: 22px; margin-bottom: 5px; }
        p { color: #86868b; font-size: 14px; margin-bottom: 25px; }
        .btn-install {
            display: inline-block; background: #0071e3; color: white;
            text-decoration: none; padding: 12px 40px; font-weight: 600;
            border-radius: 25px; font-size: 15px; transition: 0.2s;
            cursor: pointer;
        }
        .btn-install:hover { background: #0077ed; }
        .warning {
            margin-top: 30px; background: #fff3cd; color: #856404;
            padding: 15px; border-radius: 10px; font-size: 12px; text-align: left;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="app-icon">🎵</div>
        <h1>Spotify</h1>
        <p>Bersyon 1.0.0 • iOS 15 at Pataas</p>
        
        <!-- Tamang Link para sa iyong GitHub Pages at Repository -->
        <a class="btn-install" href="itms-services://?action=download-manifest&url=https://rafaelabdulhamid-netizen.github.io/Spotify/manifest.plist">
            INSTALL APP
        </a>

        <div class="warning">
            <strong>Paalala para sa mga Gumagamit:</strong><br>
            1. Siguraduhing buksan ang link na ito gamit ang <strong>Safari Browser</strong>.<br>
            2. Pagkatapos ma-install, pumunta sa <strong>Settings > General > VPN & Device Management</strong> para i-trust ang certificate bago buksan ang laro.
        </div>
    </div>

</body>
</html>
